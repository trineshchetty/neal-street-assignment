# ------------------------------------------------------------------------------
# AWS EC2 Dynamic Inventory
# ------------------------------------------------------------------------------
# Discovers EC2 instances by tags — no static IPs to maintain.
# When instances scale out, Ansible picks them up automatically.
#
# Requires: pip install boto3 botocore
# Auth: Uses the same AWS credentials as Terraform (env vars or profile)
#
# Groups are created from tags:
#   - tag_environment_dev → instances tagged environment=dev
#   - tag_service_rewards → instances tagged service=rewards
# ------------------------------------------------------------------------------

plugin: amazon.aws.aws_ec2

regions:
  - eu-west-1

filters:
  tag:project: neal-street
  instance-state-name: running

keyed_groups:
  - key: tags.environment
    prefix: env
    separator: "_"
  - key: tags.service
    prefix: svc
    separator: "_"

hostnames:
  - instance-id

compose:
  # Use SSM connection plugin — no SSH keys needed
  ansible_connection: "'aws_ssm'"
  ansible_aws_ssm_region: "'eu-west-1'"
  ansible_aws_ssm_bucket_name: "'neal-street-ssm-ansible'"
